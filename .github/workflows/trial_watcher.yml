name: 2-Trial-Watcher-Job

on:
  # 8分おきのスケジュール(cron)はすべて削除しました
  workflow_dispatch: # 手動実行ボタン（テスト用）
  repository_dispatch:
    types: [execute-bot] # GASが「発走15分前」に送ってくる合図で起動します

jobs:
  check-and-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 修正したpredict.pyに合わせて必要なライブラリをインストール
          pip install pandas selenium webdriver-manager pytz

      - name: Run Trial Fetcher
        run: python predict.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Updated CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # dataフォルダ内のCSVの変更を反映
          git add data/*.csv
          # 変更がある場合のみコミット
          if ! git diff --cached --quiet; then
            git commit -m "Update trial times [$(date)]"
            git push
          else
            echo "No changes to commit"
          fi
