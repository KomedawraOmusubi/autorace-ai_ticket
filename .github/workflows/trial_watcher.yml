name: 2-Trial-Watcher-Job

on:
  # 手動実行用
  workflow_dispatch:

  # GASからの「execute-bot」という合図を受けて起動
  repository_dispatch:
    types:
      - execute-bot

jobs:
  check-and-fetch:
    runs-on: ubuntu-latest

    # リポジトリへの書き込み権限を明示的に付与
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # GASから送られてきた ref (main等) を取得する設定
          ref: ${{ github.event.client_payload.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 必要なライブラリをインストール
          pip install pandas selenium webdriver-manager pytz requests numpy

      - name: Run Trial Fetcher
        run: python predict.py
        env:
          TZ: 'Asia/Tokyo'
          # GitHubのSettings > Secretsから環境変数へ紐付け
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}

      - name: Commit and Push Updated CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 変更がある場合のみコミットしてプッシュ
          git add data/*.csv
          if ! git diff --cached --quiet; then
            git commit -m "Update trial times and predictions: $(date +'%Y-%m-%d %H:%M:%S')"
            # プッシュ先もGASからの指定ブランチに合わせる
            git pull --rebase origin ${{ github.event.client_payload.ref }}
            git push origin ${{ github.event.client_payload.ref }}
          else
            echo "No changes (Trial time not yet updated). Skipping commit."
          fi
