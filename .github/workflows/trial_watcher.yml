Name: 2-Trial-Watcher-Job

on:
  schedule:
    # 日本時間 08:00 〜 翌 00:30 の間、5分おきに実行
    # UTC換算: 23:00 〜 15:30 (翌日の扱いを含む)
    - cron: '*/5 23,0-14 * * *' # 23時台(JST 8時)と、0時〜14時台(JST 9時〜23時)
    - cron: '0,5,10,15,20,25,30 15 * * *' # 15時台の30分まで(JST 00:30まで)
  workflow_dispatch:

jobs:
  check-and-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz

      - name: Run Trial Fetcher
        run: python trial_fetcher.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Updated CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 【変更】dataフォルダ内のCSVを保存対象にする
          git add data/*.csv
          git commit -m "Update trial times [$(date)]" || exit 0
          git push
