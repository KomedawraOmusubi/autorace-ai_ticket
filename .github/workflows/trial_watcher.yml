name: 2-Trial-Watcher-Job

on:
  schedule:
    # 8分おきに実行 (0, 8, 16, 24, 32, 40, 48, 56分)
    # 日本時間 08:00 〜 23:52 をカバー (UTC 23:00 〜 14:52)
    - cron: '0,8,16,24,32,40,48,56 23,0-14 * * *'
    # 日本時間 00:00 〜 00:32 (UTC 15:00 〜 15:32)
    - cron: '0,8,16,24,32 15 * * *'
  workflow_dispatch:

jobs:
  check-and-fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz

      - name: Run Trial Fetcher
        run: python trial_fetcher.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Updated CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.csv
          git commit -m "Update trial times [$(date)]" || exit 0
          git push
