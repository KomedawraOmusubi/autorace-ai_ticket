name: Test Prediction Run

on:
  workflow_dispatch: # GitHubのブラウザ画面から手動実行できるようにする

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # visualizerとtest.pyに必要なライブラリをすべてインストール
          pip install pandas requests Pillow

      - name: Run Test Script
        env:
          # ここが重要！Python側の os.environ.get("WEBHOOK_URL") と一致させる
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python test.py
