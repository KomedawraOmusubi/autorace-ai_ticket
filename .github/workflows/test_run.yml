name: Test Prediction Run

on:
  workflow_dispatch: # GitHubのブラウザ画面から手動実行できるようにする

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # 必要なライブラリをインストール
          pip install pandas requests Pillow

      - name: Run Test Script
        env:
          # 左辺：Pythonコードの os.environ.get("DISCORD_WEBHOOK_URL") と一致させる
          # 右辺：GitHub Secrets に登録した名前「DISCORD_WEBHOOK_URL」と一致させる
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python Test.py
