name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. リモートの状態を強制的に同期
          git fetch origin auto_ticket_v2
          git reset --hard origin/auto_ticket_v2
          
          # 2. リポジトリ上のCSV登録を一度すべて強制削除（GitHub上のゴミを消すため）
          git rm -rf data/*.csv || true
          
          # 3. Pythonが生成した「今の最新CSV」だけを登録
          git add data/*.csv || true
          
          # 4. 変更を確定
          if ! git diff --cached --quiet; then
            git commit -m "Full refresh: Cleanup old files and Update data"
            # 5. 強制プッシュでGitHub上を完全に「今のCSVだけ」にする
            git push -f origin auto_ticket_v2
          else
            echo "No changes detected."
          fi
