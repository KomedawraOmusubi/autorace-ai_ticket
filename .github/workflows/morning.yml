name: 1-Morning-Data-Job

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas selenium webdriver-manager pytz

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Pythonが作った最新のdataフォルダの状態を、そのまま名簿（インデックス）に反映
          # -A を使うことで、Pythonが消した「古いファイル」と、作った「新しいファイル」を同時に記録します
          git add -A data/*.csv || true
          
          # 2. 変更（追加・削除の両方）があればコミット
          if ! git diff --cached --quiet; then
            git commit -m "Refresh: Keep only latest data"
            
            # 3. 強制プッシュ (-f) でGitHub上の履歴を上書きし、コンフリクトを物理的に回避
            # これにより、画像24枚目のエラーや古い残骸が残る問題を解決します
            git push -f origin auto_ticket_v2
          else
            echo "No changes."
          fi
