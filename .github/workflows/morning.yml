Name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. リモートの最新状態に合わせる
          git fetch origin auto_ticket_v2
          git reset --hard origin/auto_ticket_v2
          
          # 2. 【重要】dataフォルダ内の変更（削除を含むすべて）を反映させる
          # -A オプションを使うことで、Pythonが消した古いファイルの「削除」も記録されます
          git add -A data/*.csv || true
          
          # 3. 変更があればコミット
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update race data: $(date +'%Y-%m-%d %H:%M:%S')"
            # 4. 強制プッシュでリポジトリを最新のCSVの状態に上書きする
            git push -f origin auto_ticket_v2
          else
            echo "No changes in CSV files. Skipping commit."
          fi
