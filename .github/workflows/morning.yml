name: 1-Morning-Data-Job

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # コンフリクト防止：1回目の実行結果を一旦無視して強制同期
          git fetch origin auto_ticket_v2
          git reset --hard origin/auto_ticket_v2
          
          # 1回目に生成されたCSVも含め、名簿を一度白紙にする
          git rm -rf data/*.csv || true
          
          # 2回目の最新CSVだけを登録
          git add data/*.csv || true
          
          if ! git diff --cached --quiet; then
            git commit -m "Refresh data: Only latest files kept"
            # GitHub上をこの「最新だけ」の状態に強制的に塗り替える
            git push -f origin auto_ticket_v2
          else
            echo "No changes detected."
          fi
