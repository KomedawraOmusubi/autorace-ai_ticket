Name: 1-Morning-Data-Job

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install pandas==2.2.2 selenium==4.21.0 pytz

      - name: Clean old data
        run: |
          mkdir -p data
          rm -f data/*.csv || true

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # ブランチ同期
          git fetch origin auto_ticket_v3.0.1
          git checkout auto_ticket_v3 || git checkout -b auto_ticket_v3.0.1
          git reset --hard origin auto_ticket_v3.0.1

          # CSVをすべて反映（削除含む）
          git add -A data/*.csv || true

          # 差分があればコミット＆プッシュ
          if ! git diff --cached --quiet; then
            git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')"
            git push -f origin auto_ticket_v3.0.1
          else
            echo "No CSV changes detected."
          fi
