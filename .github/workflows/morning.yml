name: 1-Morning-Data-Job

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. リモートの最新状態（auto_ticket_v2）に合わせる
          git fetch origin auto_ticket_v2
          git reset --soft origin/auto_ticket_v2
          
          # 2. 【重要】削除された古いファイルと、新しく作られたファイルを一括で名簿に反映
          # これにより、空っぽにならず「今のCSVだけ」が残ります
          git add -A data/*.csv || true
          
          # 3. 変更（追加・削除の両方）があればコミット
          if ! git diff --cached --quiet; then
            git commit -m "Full refresh: Cleanup old files and Update data"
            # 4. 強制プッシュでGitHub上を完全に「今の状態」に同期
            git push -f origin auto_ticket_v2
          else
            echo "No changes detected."
          fi
