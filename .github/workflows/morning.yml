name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 既存の変更をすべて無視して、リモートの最新状態を強制的に取り込む
          git fetch origin HEAD
          git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
          
          # 2. Pythonが生成した新しいCSVをステージングする
          git add data/*.csv || true
          
          # 3. 変更があればコミットしてプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update race data: $(date +'%Y-%m-%d %H:%M:%S')"
            # 強制的に現在のブランチへプッシュ（コンフリクトを回避）
            git push origin HEAD
          else
            echo "No changes in CSV files. Skipping commit."
          fi
