name: 1-Morning-Data-Job

on:
  schedule:
    - cron: '0 23 * * *' # 日本時間 08:00 (世界標準時 23:00)
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 【変更】dataフォルダ内のCSVをすべて追加対象にする
          git add data/*.csv
          # 変更がない場合でもエラーにせず終了する設定
          git commit -m "Create base race data [$(date)]" || exit 0
          git push
