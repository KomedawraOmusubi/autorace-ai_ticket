name: 1-Morning-Data-Job

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas selenium webdriver-manager pytz

      - name: Clean old data
        run: |
          mkdir -p data
          rm -f data/*.csv || true

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 正しいブランチを取得＆同期
          git fetch origin auto_ticket_v3.4.1
          git checkout -B auto_ticket_v3.4.1 origin/auto_ticket_v3.4.1

          # CSVをすべて反映（削除含む）
          git add -A data/

          # 差分があればコミット＆push
          if ! git diff --cached --quiet; then
            git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')"
            git push origin auto_ticket_v3.4.1
          else
            echo "No CSV changes detected."
          fi
