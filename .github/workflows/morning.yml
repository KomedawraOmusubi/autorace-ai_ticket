name: 1-Morning-Data-Job

on:
  # 定期実行(cron)は削除しました
  workflow_dispatch: # 手動実行ボタン（テスト用）
  repository_dispatch:
    types: [check-schedule] # GASの午前1時トリガーからこれを受けて起動します

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # ファイルの追加・削除の両方を反映
          git add -A data/*.csv
          # 変更がある場合のみコミット
          if ! git diff --cached --quiet; then
            git commit -m "Cleanup old data and Create new base [$(date)]"
            git push
          else
            echo "No changes to commit"
          fi
