name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. リモートの状態に強制リセット
          git fetch origin auto_ticket_v2
          git reset --hard origin/auto_ticket_v2
          
          # 2. 【ここが重要】一度リポジトリ上のCSV登録をすべて解除する（物理削除ではなく追跡解除）
          git rm -r --cached data/*.csv || true
          
          # 3. Pythonが生成した「今日の最新CSV」だけをすべて追加し直す
          git add data/*.csv || true
          
          # 4. 変更（古いファイルの削除と新しいファイルの追加）をコミット
          if ! git diff --cached --quiet; then
            git commit -m "Cleanup old data and Update: $(date +'%Y-%m-%d %H:%M:%S')"
            # 5. 強制プッシュでGitHub上を今の状態に完全に置き換える
            git push -f origin auto_ticket_v2
          else
            echo "No changes."
          fi
