name: 1-Morning-Data-Job

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas selenium webdriver-manager pytz

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 履歴のズレによるエラー を防ぐために強制リセット
          git fetch origin auto_ticket_v2
          git reset --soft origin/auto_ticket_v2
          
          # 2. ★超重要：GitHub上の古いCSVを一度すべて「削除対象」にする
          # これにより2日前のファイル などが残るのを物理的に防ぎます
          git rm -f data/*.csv || true
          
          # 3. Pythonが今回生成した「今日の最新CSV」だけを改めてGitに登録
          git add data/*.csv || true
          
          # 4. 変更があれば「完全に中身を入れ替える」コミットを作成
          if ! git diff --cached --quiet; then
            git commit -m "Full Refresh: Latest data only ($(date +'%Y-%m-%d %H:%M'))"
            # 5. 強制プッシュ (-f) でGitHub上のデータを最新の1セットだけに塗り替える
            git push -f origin auto_ticket_v2
          else
            echo "No changes detected."
          fi
