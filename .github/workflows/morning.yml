name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. まず現在のリモートの変更を取り込んでおく（コンフリクト回避）
          git pull origin HEAD --rebase
          
          # 2. 変更をステージング
          git add data/*.csv || true
          
          # 3. 変更がある場合のみ処理
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update race data: $(date +'%Y-%m-%d %H:%M:%S')"
            # 4. コミット直後にプッシュ（すでにプル済みなので安全）
            git push origin HEAD
          else
            echo "No changes in CSV files. Skipping commit."
          fi
