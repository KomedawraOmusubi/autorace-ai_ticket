name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. 変更をステージング（dataフォルダ内の削除・追加をすべて反映）
          git add data/*.csv || true
          
          # 2. 変更がある場合のみコミットとプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update race data: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 3. 安全にプッシュするための修正
            # mainに固定せず、現在の作業ブランチ(HEAD)に対して処理
            git pull --rebase origin HEAD
            git push origin HEAD
          else
            echo "No changes in CSV files. Skipping commit."
          fi
