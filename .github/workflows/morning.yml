name: 1-Morning-Data-Job

on:
  workflow_dispatch: 
  repository_dispatch:
    types: [check-schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas selenium webdriver-manager pytz requests

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push Base CSVs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. ネットワーク上の最新状態を取り込む
          git fetch origin auto_ticket_v2
          
          # 2. 強制的にリセットして衝突(CONFLICT)を解消する
          git reset --hard origin/auto_ticket_v2
          
          # 3. Pythonが作った最新のCSVだけを反映させる
          git add -A data/*.csv || true
          
          # 4. 変更があればコミット
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update race data: $(date +'%Y-%m-%d %H:%M:%S')"
            # 5. 強制プッシュで履歴を整理する
            git push -f origin auto_ticket_v2
          else
            echo "No changes."
          fi
