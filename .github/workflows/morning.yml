name: 1-Morning-Data-Job

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas selenium webdriver-manager pytz

      - name: Clean old data
        run: |
          mkdir -p data
          rm -f data/*.csv || true

      - name: Run Morning Job
        run: python morning_job.py
        env:
          TZ: 'Asia/Tokyo'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 1. 履歴の強制リセット
          git fetch origin auto_ticket_v3.0.1
          git reset --soft origin/auto_ticket_v3.0.1

          # 2. Pythonが今作った新しいCSVを優先的にGitに追加
          git add data/*.csv || true

          # 3. 今回作られなかった（＝古い）CSVを名簿（インデックス）から削除
          # これにより、物理的に消えたファイルがGit上でも「削除」として扱われます
          git add -u data/*.csv || true

          # 4. 変更があればコミットして強制プッシュ
          if ! git diff --cached --quiet; then
            git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')"
            git push -f origin auto_ticket_v3.0.1
          else
            echo "No CSV changes detected."
          fi
